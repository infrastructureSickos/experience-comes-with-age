name: Build and Publish to Modrinth

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Publish to Modrinth
        if: startsWith(github.ref, 'refs/tags/v')
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          files: build/libs/*.jar
          name: ExperienceComesWithAge ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          game-versions: 1.20.1
          loaders: forge
          java: 17

      - name: Trigger modpack update
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MODPACK_DISPATCH_TOKEN }}
          repository: brooswit/minecraft-modpack
          event-type: experience-comes-with-age-updated
          client-payload: '{"version": "${{ github.ref_name }}"}'
